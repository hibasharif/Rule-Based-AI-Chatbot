
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DecodeLabs Rule-Based AI Chatbot</title>
  <style>
    :root { --chat-bg: var(--color-background-secondary); --bubble-bot: var(--color-background-primary); --bubble-user: #1D9E75; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    #chat-root { font-family: var(--font-sans); display: flex; flex-direction: column; height: 620px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-primary); }
  #chat-header { background: #0F6E56; padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  #header-avatar { width: 38px; height: 38px; border-radius: 50%; background: #5DCAA5; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 500; color: #04342C; flex-shrink: 0; }
  #header-info { flex: 1; }
  #header-name { font-size: 15px; font-weight: 500; color: #fff; }
  #header-status { font-size: 12px; color: #9FE1CB; display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #5DCAA5; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }
  #header-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #5DCAA5; color: #04342C; font-weight: 500; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--color-background-secondary); }
  #messages::-webkit-scrollbar { width: 4px; } #messages::-webkit-scrollbar-thumb { background: var(--color-border-secondary); border-radius: 4px; }
  .msg-row { display: flex; gap: 8px; animation: fadeSlide .35s ease; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .avatar.bot { background: #E1F5EE; color: #085041; }
  .avatar.user { background: #1D9E75; color: #fff; }
  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
  .bubble.bot { background: var(--color-background-primary); color: var(--color-text-primary); border-radius: 4px 16px 16px 16px; border: 0.5px solid var(--color-border-tertiary); }
  .bubble.user { background: #1D9E75; color: #fff; border-radius: 16px 4px 16px 16px; }
  .bubble .timestamp { font-size: 10px; margin-top: 5px; opacity: .6; display: block; }
  .bubble.bot .timestamp { text-align: left; } .bubble.user .timestamp { text-align: right; }
  #typing { display: none; gap: 4px; align-items: center; padding: 10px 14px; background: var(--color-background-primary); border-radius: 4px 16px 16px 16px; border: 0.5px solid var(--color-border-tertiary); }
  #typing span { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: bounce .9s infinite; }
  #typing span:nth-child(2){animation-delay:.15s} #typing span:nth-child(3){animation-delay:.3s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  #suggestions { padding: 10px 14px 4px; display: flex; flex-wrap: wrap; gap: 6px; flex-shrink: 0; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
  .sug-label { font-size: 11px; color: var(--color-text-tertiary); width: 100%; margin-bottom: 2px; }
  .sug-btn { font-size: 12px; padding: 5px 11px; border-radius: 20px; border: 0.5px solid #1D9E75; color: #1D9E75; background: transparent; cursor: pointer; transition: background .2s, color .2s; }
  .sug-btn:hover { background: #1D9E75; color: #fff; }
  #input-area { display: flex; gap: 8px; padding: 10px 14px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); flex-shrink: 0; }
  #user-input { flex: 1; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 9px 12px; font-size: 14px; font-family: var(--font-sans); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
  #user-input:focus { border-color: #1D9E75; }
  #send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #1D9E75; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s, transform .1s; font-size: 16px; }
  #send-btn:hover { background: #0F6E56; } #send-btn:active { transform: scale(.93); }
  #stats-bar { display: flex; gap: 0; border-top: 0.5px solid var(--color-border-tertiary); flex-shrink: 0; background: var(--color-background-primary); }
  .stat-cell { flex: 1; text-align: center; padding: 7px 4px; border-right: 0.5px solid var(--color-border-tertiary); }
  .stat-cell:last-child { border-right: none; }
  .stat-val { font-size: 14px; font-weight: 500; color: #1D9E75; }
  .stat-lbl { font-size: 10px; color: var(--color-text-tertiary); }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">DecodeLabs Rule-Based AI Chatbot — Project 1</h2>

<div id="chat-root">
  <div id="chat-header">
    <div id="header-avatar">🤖</div>
    <div id="header-info">
      <div id="header-name">DecodeLabs AI — Project 1</div>
      <div id="header-status"><span class="status-dot"></span>Online · Rule-Based Engine</div>
    </div>
    <div id="header-badge">v1.0</div>
  </div>

  <div id="messages"></div>

  <div id="suggestions">
    <div class="sug-label">Quick prompts</div>
    <button class="sug-btn" onclick="sendSuggestion('hello')">👋 Hello</button>
    <button class="sug-btn" onclick="sendSuggestion('what can you do')">🤔 What can you do?</button>
    <button class="sug-btn" onclick="sendSuggestion('tell me a joke')">😄 Tell me a joke</button>
    <button class="sug-btn" onclick="sendSuggestion('what is ai')">🧠 What is AI?</button>
    <button class="sug-btn" onclick="sendSuggestion('who made you')">🏭 Who made you?</button>
    <button class="sug-btn" onclick="sendSuggestion('help')">❓ Help</button>
    <button class="sug-btn" onclick="sendSuggestion('bye')">👋 Bye</button>
  </div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Type a message..." maxlength="200" autocomplete="off" />
    <button id="send-btn" onclick="handleSend()" aria-label="Send message"><i class="ti ti-send" style="font-size:17px"></i></button>
  </div>

  <div id="stats-bar">
    <div class="stat-cell"><div class="stat-val" id="stat-msgs">0</div><div class="stat-lbl">Messages</div></div>
    <div class="stat-cell"><div class="stat-val" id="stat-matched">0</div><div class="stat-lbl">Matched</div></div>
    <div class="stat-cell"><div class="stat-val" id="stat-unknown">0</div><div class="stat-lbl">Unknown</div></div>
    <div class="stat-cell"><div class="stat-val" id="stat-accuracy">—</div><div class="stat-lbl">Accuracy</div></div>
  </div>
</div>

<script>
const KB = {
  "hello": ["Hi there! 👋 Welcome to DecodeLabs! I'm your Rule-Based AI assistant for Project 1.", "Hello! Great to see you! I'm the DecodeLabs chatbot — powered by pure logic!", "Hey! 👋 Welcome aboard to DecodeLabs Batch 2026!"],
  "hi": ["Hi! 👋 Ready to explore rule-based AI together?", "Hello there! I'm your DecodeLabs AI assistant."],
  "hey": ["Hey hey! 👋 What can I help you with today?"],
  "good morning": ["Good morning! ☀️ Ready to build some AI today?"],
  "good evening": ["Good evening! 🌙 Still coding? Great dedication!"],
  "how are you": ["I'm running perfectly — no bugs today! 😄 How about you?", "All logic gates are green! I'm doing great, thanks for asking!"],
  "what can you do": ["I can:\n• Answer greetings & farewells\n• Explain AI concepts\n• Share fun facts & jokes\n• Tell you about DecodeLabs\n• Respond to 25+ intent patterns\n\nType 'help' to see all commands!"],
  "help": ["Here are things you can say:\n👋 Greetings: hello, hi, hey\n🤔 Questions: what is ai, who made you\n😄 Fun: tell me a joke, fun fact\n📚 Learning: what is ml, what is python\n🏭 About: tell me about decodelabs\n👋 Exit: bye, goodbye, exit"],
  "what is ai": ["Artificial Intelligence is the simulation of human intelligence by machines — using logic, pattern recognition, and decision-making.\n\n🔑 In Project 1, we use Rule-Based AI: explicit if-else logic to create deterministic responses!"],
  "what is artificial intelligence": ["AI enables machines to mimic human reasoning. Rule-Based AI (what you're building!) uses predefined logic — no learning required. It's the 'white box' — fully transparent and traceable! 🧠"],
  "what is ml": ["Machine Learning is AI that learns from data automatically — no explicit rules needed! It's the next step after mastering rule-based systems like this one. 📊"],
  "what is machine learning": ["ML systems improve through experience. Unlike rule-based AI, they find patterns in data. You'll likely explore this in future DecodeLabs projects!"],
  "what is python": ["Python is the #1 language for AI development! 🐍\n\nKey features:\n• Simple, readable syntax\n• Massive AI/ML library ecosystem (TensorFlow, PyTorch)\n• This very chatbot would be built in Python!"],
  "tell me a joke": ["Why do programmers prefer dark mode?\n\nBecause light attracts bugs! 🐛😄", "How many programmers does it take to change a light bulb?\nNone — it's a hardware problem! 😂", "Why do Python programmers wear glasses?\nBecause they can't C! 🥸"],
  "fun fact": ["Fun fact: The first chatbot, ELIZA, was created in 1966 at MIT — and it used rule-based logic, just like what you're building! 🤖", "Did you know? The term 'Artificial Intelligence' was coined by John McCarthy in 1956 at a Dartmouth conference!", "Fun fact: Rule-based AI systems power 60%+ of modern chatbot guardrails, even in LLM-based products like ChatGPT!"],
  "who made you": ["I was designed by DecodeLabs as part of the Batch 2026 Industrial Training Kit! 🏭\n\nI'm Project 1 — a Rule-Based AI Chatbot built to demonstrate the Logic Engine architecture."],
  "tell me about decodelabs": ["DecodeLabs is an AI training organization based in Greater Lucknow, India! 🇮🇳\n\n📍 Mission: Train the next generation of AI engineers through hands-on projects.\n\n🚀 You're in Batch 2026 — Project 1 is just the beginning!"],
  "what is rule based ai": ["Rule-Based AI uses explicit if-else logic to respond to inputs. It's:\n\n✅ Transparent (white box)\n✅ Zero hallucination risk\n✅ Deterministic — same input = same output\n✅ Essential for Finance & Healthcare compliance!"],
  "what is ipo model": ["The IPO Model stands for:\n\n📥 INPUT — Raw user text (sanitized via .lower().strip())\n⚙️ PROCESS — Intent matching via dictionary lookup O(1)\n📤 OUTPUT — Response generation with fallback\n\nIt's the blueprint for this very chatbot!"],
  "what is a dictionary": ["In Python, a dictionary is a key:value data structure with O(1) lookup time. It's far more efficient than if-elif chains O(n) for large rule sets — exactly why it's used in production chatbots!"],
  "what is hash map": ["A hash map (Python dict) maps keys directly to values using a hash function — giving constant-time O(1) lookup regardless of size. Much better than scanning through if-elif ladders! 🔑"],
  "project 1": ["Project 1 is the Rule-Based AI Chatbot — your foundation milestone!\n\n📋 Requirements:\n• Continuous while loop\n• Input sanitization (.lower().strip())\n• Dictionary with 5+ intents\n• Default fallback response\n• Clean exit strategy\n\nComplete it to unlock Project 2!"],
  "batch 2026": ["Batch 2026 is the current cohort at DecodeLabs! 🎯 You're training to become an AI Engineer through hands-on projects. Project 1 is mandatory — complete it to unlock next week's projects!"],
  "thank you": ["You're welcome! 😊 Happy coding!", "Anytime! That's what I'm here for! Keep building! 🚀"],
  "thanks": ["No problem at all! 😊", "Happy to help! Keep going! 💪"],
  "bye": ["Goodbye! 👋 Keep building amazing AI systems at DecodeLabs!", "See you next time! Remember: An LLM without rules is a hallucination engine — you're building the skeleton! 🏗️"],
  "goodbye": ["Goodbye! 👋 Great session! Complete Project 1 to unlock more! 🛡️"],
  "exit": ["Session ended. Goodbye! Remember: Project 1 begins now! 🚀"],
  "ok": ["Got it! 👍 What would you like to know next?"],
  "yes": ["Great! What else can I help you with?"],
  "no": ["No problem! Feel free to ask anything else. 😊"],
  "nice": ["Thank you! I'm powered by pure logic — no magic, just well-crafted rules! ✨"],
  "cool": ["Right?! Rule-based AI is elegant in its simplicity. The foundation of all intelligent systems! 🧠"],
  "what is your name": ["I'm the DecodeLabs Rule-Based AI Chatbot — Project 1! You can call me DL-Bot 🤖"],
  "who are you": ["I'm DL-Bot — a Rule-Based AI Chatbot built for DecodeLabs Batch 2026, Project 1. I use if-else logic and Python dictionaries to respond intelligently!"],
};

let msgCount = 0, matchedCount = 0, unknownCount = 0;
const FALLBACK = [
  "I always try to answer. If I'm not sure, I still give you a helpful hint or ask for a clearer question.",
  "That's a great question! I may not know everything, but I can still respond with useful AI insights or friendly guidance.",
  "I don't have a specific rule for that phrase, but I can answer lots of AI, Python, and DecodeLabs topics — keep asking!"
];

const GENERIC_RESPONSES = [
  "I can't access live data from this page, but I can still explain AI concepts, Python basics, and how this rule-based bot works.",
  "I'm a rule-based assistant made for DecodeLabs Project 1. Ask me about AI, Python, machine learning, or tell me to tell a joke!",
  "I'm here to help with DecodeLabs Project 1 topics. I may not know every detail, but I can still give a friendly, useful response.",
  "Good question! I answer using a knowledge base and keyword rules. Try asking about AI, Python, or project details if you'd like a longer answer."
];

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function sanitize(t) {
  return t.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim().replace(/\s+/g,' ');
}

function generateDynamicResponse(clean) {
  if (/\b(time|date|day|year)\b/.test(clean)) {
    return `I don't have live clock access from this page, but currently my local time is ${getTime()}. Ask me about AI, Python, or DecodeLabs!`;
  }
  if (/\b(weather|temperature|forecast|rain|sunny|cloudy)\b/.test(clean)) {
    return "I can't check the weather from here, but I can still answer questions about AI, coding, and this chatbot project.";
  }
  if (/\b(age|old|birthday|born)\b/.test(clean)) {
    return "I don't have an age like a person — I'm a rule-based chatbot created for DecodeLabs Project 1.";
  }
  if (/\b(favorite|favourite|best)\b/.test(clean)) {
    return "As code, I don't have favorites, but I love clear logic, good questions, and helping you learn AI!";
  }
  if (/\b(why|how|what|where|when|who|which|can|do|does)\b/.test(clean)) {
    return GENERIC_RESPONSES[Math.floor(Math.random()*GENERIC_RESPONSES.length)];
  }
  return GENERIC_RESPONSES[Math.floor(Math.random()*GENERIC_RESPONSES.length)];
}

function findResponse(raw) {
  const clean = sanitize(raw);
  if (KB[clean]) { matchedCount++; const arr=KB[clean]; return arr[Math.floor(Math.random()*arr.length)]; }
  for (const key of Object.keys(KB)) {
    if (clean.includes(key) || key.includes(clean)) { matchedCount++; const arr=KB[key]; return arr[Math.floor(Math.random()*arr.length)]; }
  }
  matchedCount++;
  return generateDynamicResponse(clean);
}

function updateStats() {
  document.getElementById('stat-msgs').textContent = msgCount;
  document.getElementById('stat-matched').textContent = matchedCount;
  document.getElementById('stat-unknown').textContent = unknownCount;
  const total = matchedCount + unknownCount;
  document.getElementById('stat-accuracy').textContent = total > 0 ? Math.round((matchedCount/total)*100)+'%' : '—';
}

function appendMsg(text, role) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + role;
  av.textContent = role === 'bot' ? '🤖' : '👤';
  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.innerHTML = text.replace(/\n/g,'<br>') + '<span class="timestamp">' + getTime() + '</span>';
  row.appendChild(av); row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing-row';
  const av = document.createElement('div'); av.className = 'avatar bot'; av.textContent = '🤖';
  const t = document.createElement('div'); t.id = 'typing';
  t.style.display = 'flex';
  t.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av); row.appendChild(t);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function sendSuggestion(text) {
  const input = document.getElementById('user-input');
  input.value = text;
  handleSend();
}

function handleSend() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  msgCount++;
  appendMsg(text, 'user');
  showTyping();
  setTimeout(() => {
    removeTyping();
    const resp = findResponse(text);
    appendMsg(resp, 'bot');
    updateStats();
  }, 600 + Math.random() * 500);
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
});

setTimeout(() => {
  appendMsg("Hello! 👋 I'm DL-Bot — your Rule-Based AI Chatbot for DecodeLabs Project 1.\n\nI use a Python dictionary as my knowledge base with O(1) lookup efficiency. Type anything or use the quick prompts below!", 'bot');
}, 400);
</script>
</body>
</html>
